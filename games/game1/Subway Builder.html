<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Builder - Метрополитен Магнат</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0e1422 100%);
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Кнопка меню */
        .menu-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: rgba(20, 28, 44, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 250;
            border: 1px solid rgba(100, 150, 255, 0.4);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .menu-button:hover {
            transform: scale(1.05);
            background: rgba(30, 45, 70, 0.95);
            border-color: rgba(100, 150, 255, 0.8);
        }
        .menu-button span {
            width: 24px;
            height: 2px;
            background: #ffffff;
            border-radius: 2px;
            transition: 0.2s;
        }

        /* Меню-панель */
        .game-menu-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(15, 22, 36, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 0;
            min-width: 200px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 300;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-menu-panel button {
            width: 100%;
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #eef2ff;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .game-menu-panel button:hover {
            background: rgba(70, 120, 200, 0.5);
        }

        /* Главное меню */
        .main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1c 0%, #12182a 100%);
            backdrop-filter: blur(0px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-card {
            background: rgba(20, 28, 44, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 56px;
            min-width: 420px;
            text-align: center;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .menu-card h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #e0f0ff, #7c9eff, #4a6acf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -1px;
            font-weight: 700;
        }
        .menu-card .subtitle {
            color: #8a9bd0;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .menu-btn {
            background: rgba(30, 45, 70, 0.9);
            border: 1px solid rgba(100, 150, 255, 0.4);
            padding: 14px 28px;
            width: 100%;
            margin: 12px 0;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .menu-btn:hover {
            background: #2d4a7c;
            transform: translateY(-2px);
            border-color: #7c9eff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .mode-selector {
            display: flex;
            gap: 16px;
            margin: 20px 0;
        }
        .mode-option {
            flex: 1;
            background: #1e2a3a;
            border-radius: 40px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            color: #ffffff;
            font-weight: 500;
            transition: 0.2s;
        }
        .mode-option.selected {
            background: #2d4a7c;
            border-color: #7c9eff;
            box-shadow: 0 0 12px rgba(100,150,255,0.3);
        }
        .save-load-panel {
            margin-top: 20px;
            border-top: 1px solid #2a3a55;
            padding-top: 20px;
        }
        .save-item {
            background: #0f172a;
            margin: 8px 0;
            padding: 10px 18px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #ffffff;
            transition: 0.15s;
        }
        .save-item:hover {
            background: #1e2a44;
        }
        .delete-save {
            background: none;
            border: none;
            color: #ff8a7a;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 8px;
        }

        /* Обучение */
        .tutorial-overlay {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 20px;
            max-width: 320px;
            color: #fff;
            font-size: 0.85rem;
            z-index: 250;
            border-left: 3px solid #7c9eff;
            pointer-events: none;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .tutorial-close {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            pointer-events: auto;
        }

        /* Основная панель инструментов внизу */
        .main-toolbar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 22, 36, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 24px;
            display: flex;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 200;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        /* Дополнительные панели - подняты выше основной */
        .station-tools-panel, .line-tools-panel {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 22, 36, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px 24px;
            display: flex;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 199;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            animation: slideUpPanel 0.2s ease;
        }
        @keyframes slideUpPanel {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .tool-btn, .mode-btn-tool {
            background: rgba(30, 45, 70, 0.8);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #eef2ff;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .tool-btn.active, .mode-btn-tool.active-mode {
            background: #3a5a8c;
            color: white;
            box-shadow: 0 0 12px rgba(70,130,255,0.5);
            border: 1px solid #9bbdff;
        }
        .line-color-input {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
        }
        .right-top-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 200;
        }
        .status-badge {
            background: #1e2a3edd;
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #3a5f8e;
            color: #ffffff;
        }
        .custom-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 28, 44, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 32px;
            min-width: 340px;
            border: 1px solid rgba(100, 150, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10000;
            animation: modalFadeIn 0.2s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .custom-modal input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 15, 25, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 40px;
            color: white;
            margin: 20px 0;
            outline: none;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.confirm { background: #3a5a8c; color: white; }
        .modal-btn.cancel { background: #3a2a2a; color: #ffaa99; }
        .custom-context-menu {
            position: fixed;
            background: rgba(25, 35, 55, 0.98);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 8px 0;
            min-width: 220px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            z-index: 10000;
        }
        .custom-context-menu button {
            width: 100%;
            padding: 12px 20px;
            background: transparent;
            border: none;
            text-align: left;
            color: white;
            cursor: pointer;
        }
        .custom-context-menu button:hover { background: rgba(70, 120, 200, 0.6); }
        .info-hint-bottom {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: #ccc;
            z-index: 200;
        }
        .save-top-btn {
            background: #2a3e6e;
            border-radius: 32px;
            padding: 10px 24px;
            border: none;
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: 0.2s;
        }
        .save-top-btn:hover {
            background: #3a5a8c;
            transform: scale(1.02);
        }
        @media (max-width: 700px) {
            .tool-btn, .mode-btn-tool { padding: 8px 16px; min-width: 90px; font-size: 0.8rem; }
            .menu-card { min-width: 320px; padding: 32px 24px; }
            .station-tools-panel, .line-tools-panel { bottom: 90px; padding: 6px 16px; gap: 8px; flex-wrap: wrap; width: 90%; justify-content: center; }
            .main-toolbar { padding: 6px 16px; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="menu-button" id="menuButton"><span></span><span></span><span></span></div>
    <div class="right-top-panel"><div class="status-badge" id="gameStatusBadge"></div><button class="save-top-btn" id="saveTopBtn">💾 Сохранить</button></div>
    <div class="main-toolbar" id="mainToolbar"><button class="tool-btn" id="toolStation">🏛️ Станция</button><button class="tool-btn" id="toolLine">📈 Линия</button></div>
    <div class="station-tools-panel" id="stationToolsPanel"><button class="mode-btn-tool" id="normalStationBtn">🏛️ Обычная</button><button class="mode-btn-tool" id="popularStationBtn">⭐ Популярная</button><button class="mode-btn-tool" id="centerStationBtn">🔷 Центр</button><button class="mode-btn-tool" id="tripleStationBtn">🔺 Тройная</button></div>
    <div class="line-tools-panel" id="lineToolsPanel"><label style="color:white;display:flex;align-items:center;gap:8px;">🎨 Цвет:<input type="color" id="lineColorPicker" class="line-color-input" value="#ff8844"></label><button class="mode-btn-tool" id="addPointModeBtn">➕ Точки</button><button class="mode-btn-tool delete-line-btn" id="deleteLineModeBtn">🗑️ Удалить</button><button class="mode-btn-tool" id="exitPointModeBtn" style="display:none;">❌ Выйти</button></div>
    <div class="info-hint-bottom" id="infoHint"></div>
</div>
<script>
    (function(){
        // Звуки и музыка
        let audioCtx = null;
        let musicInterval = null;
        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Фоновая музыка (тихая, простая)
            let note = 0;
            musicInterval = setInterval(() => {
                if(!audioCtx || audioCtx.state !== 'running') return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    const notes = [261.63, 293.66, 329.63, 349.23, 392.00];
                    osc.frequency.value = notes[note % notes.length];
                    gain.gain.value = 0.03;
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 1.2);
                    note++;
                } catch(e) {}
            }, 2800);
        }
        function playSound(type) {
            if(!audioCtx) initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                if(type === 'place') { osc.frequency.value = 523.25; gain.gain.value = 0.12; gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25); osc.start(); osc.stop(audioCtx.currentTime + 0.25); }
                else if(type === 'line') { osc.frequency.value = 392.00; gain.gain.value = 0.1; gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.22); osc.start(); osc.stop(audioCtx.currentTime + 0.22); }
                else if(type === 'delete') { osc.frequency.value = 220.00; gain.gain.value = 0.08; gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
                else if(type === 'click') { osc.frequency.value = 880.00; gain.gain.value = 0.05; gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            } catch(e) {}
        }
        
        // Данные игры
        let stations = [], lines = [], nextStationId = 1, nextLineId = 1;
        let camera = { x: 0, y: 0, zoom: 1.0 }, isPanning = false, panStart = { x: 0, y: 0 };
        let gameMode = "free", money = 8000, totalPassengers = 0, gameStarted = false, tutorialMode = false, tutorialStep = 0;
        let activeTool = "station", currentLineColor = "#ff8844", selectedStationType = "normal";
        let isPointCreationMode = false, isDeleteLineMode = false, selectedStartPoint = null, currentContextMenu = null;
        let saves = JSON.parse(localStorage.getItem("metro_saves") || "{}");
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let width, height;
        
        // Обучение
        const tutorialMessages = [
            "🏛️ Добро пожаловать в Subway Builder! Нажмите 'Станция' и выберите тип, затем кликните на сетку, чтобы построить станцию.",
            "📈 Переключитесь на 'Линия', выберите цвет, кликните на станцию → затем на другую, чтобы проложить линию.",
            "🔘 ПКМ по станции → 'Включить схождение', чтобы линии плавно сходились к центру.",
            "➕ В режиме 'Линия' нажмите 'Точки', чтобы создавать промежуточные узлы для изогнутых линий.",
            "💾 Кнопка 'Сохранить' сохраняет игру. Меню в левом верхнем углу позволяет выйти."
        ];
        function showTutorial() { if(tutorialMode && tutorialStep < tutorialMessages.length) { let div = document.querySelector('.tutorial-overlay'); if(div) div.remove(); div = document.createElement('div'); div.className = 'tutorial-overlay'; div.innerHTML = `<span class="tutorial-close">✖</span><p>${tutorialMessages[tutorialStep]}</p><small>Шаг ${tutorialStep+1}/${tutorialMessages.length}</small>`; document.body.appendChild(div); div.querySelector('.tutorial-close').onclick = () => { div.remove(); tutorialStep++; showTutorial(); playSound('click'); }; } }
        
        // Вспомогательные функции
        function closeContextMenu() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } }
        function screenToWorld(cx, cy) { const rect = canvas.getBoundingClientRect(); const canvasX = (cx - rect.left) * (canvas.width/rect.width), canvasY = (cy - rect.top) * (canvas.height/rect.height); return { x: (canvasX/camera.zoom)-camera.x, y: (canvasY/camera.zoom)-camera.y }; }
        function worldToScreen(wx, wy) { return { x: (wx + camera.x)*camera.zoom, y: (wy + camera.y)*camera.zoom }; }
        function snapToGrid(x,y,g=50) { return { x: Math.round(x/g)*g, y: Math.round(y/g)*g }; }
        function getStationAtWorld(wx,wy,th=30) { for(let s of stations) if(Math.hypot(s.x-wx, s.y-wy)<th) return s; return null; }
        function getUniqueLineColors() { return new Set(lines.map(l=>l.color)).size; }
        function getLinesBetweenPoints(id1,id2) { return lines.filter(l=>l.stationIds&&l.stationIds.includes(id1)&&l.stationIds.includes(id2)); }
        function getLineAtWorld(wx,wy,th=6) { for(let line of lines) { if(line.points.length<2) continue; const [id1,id2]=line.stationIds, siblings=getLinesBetweenPoints(id1,id2), idx=siblings.findIndex(l=>l.id===line.id), total=siblings.length; let off=0; if(total>1){ const sp=12, st=-((total-1)*sp)/2; off=st+idx*sp; } const p1=line.points[0],p2=line.points[1],dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.hypot(dx,dy); if(len===0) continue; const perpX=-dy/len, perpY=dx/len, op1={x:p1.x+perpX*off,y:p1.y+perpY*off}, op2={x:p2.x+perpX*off,y:p2.y+perpY*off}, ax=op2.x-op1.x,ay=op2.y-op1.y,bx=wx-op1.x,by=wy-op1.y,dot=bx*ax+by*ay,len2=ax*ax+ay*ay; if(len2===0) continue; let t=Math.max(0,Math.min(1,dot/len2)); const proj={x:op1.x+ax*t,y:op1.y+ay*t}; if(Math.hypot(wx-proj.x,wy-proj.y)<th) return {line,lineIndex:idx,totalLines:total,siblingLines:siblings}; } return null; }
        function reorderLine(line,dir){ const [id1,id2]=line.stationIds, siblings=getLinesBetweenPoints(id1,id2), ci=siblings.findIndex(l=>l.id===line.id), ni=ci+dir; if(ni<0||ni>=siblings.length)return; const gi=lines.findIndex(l=>l.id===line.id), ti=lines.findIndex(l=>l.id===siblings[ni].id); [lines[gi],lines[ti]]=[lines[ti],lines[gi]]; updateUI(); }
        function toggleConvergeToCenter(st) { st.convergeToCenter = !st.convergeToCenter; updateUI(); }
        function addStation(wx,wy,type,name){ const s=snapToGrid(wx,wy); if(getStationAtWorld(s.x,s.y,25))return null; const id=nextStationId++; const newSt={id,x:s.x,y:s.y,name:name||`Станция ${id}`,type,linesConnected:[],isConnectionPoint:false,convergeToCenter:false}; stations.push(newSt); updateStatsUI(); playSound('place'); return newSt; }
        function addConnectionPoint(wx,wy){ const s=snapToGrid(wx,wy); if(getStationAtWorld(s.x,s.y,25))return null; const id=nextStationId++; const np={id,x:s.x,y:s.y,name:null,type:'connection',isConnectionPoint:true,linesConnected:[],convergeToCenter:false}; stations.push(np); updateStatsUI(); playSound('place'); return np; }
        function createLine(p1,p2,col){ if(p1.id===p2.id)return null; const lid=nextLineId++; const newL={id:lid,points:[{x:p1.x,y:p1.y},{x:p2.x,y:p2.y}],color:col,name:`Линия ${lid}`,stationIds:[p1.id,p2.id]}; if(!p1.linesConnected.includes(lid))p1.linesConnected.push(lid); if(!p2.linesConnected.includes(lid))p2.linesConnected.push(lid); lines.push(newL); updateStatsUI(); recalcPassengers(); playSound('line'); if(gameMode==='story'){ let cost=200; if(money>=cost)money-=cost; else{ removeLine(lid); alert("Недостаточно средств!"); return null; } } return newL; }
        function removeLine(id){ const idx=lines.findIndex(l=>l.id===id); if(idx===-1)return; lines.splice(idx,1); for(let st of stations) st.linesConnected=st.linesConnected.filter(l=>l!==id); updateStatsUI(); recalcPassengers(); playSound('delete'); }
        function removeStation(id){ const idx=stations.findIndex(s=>s.id===id); if(idx===-1)return; const aff=lines.filter(l=>l.stationIds.includes(id)); aff.forEach(l=>removeLine(l.id)); stations.splice(idx,1); updateStatsUI(); recalcPassengers(); selectedStartPoint=null; playSound('delete'); }
        function renameStation(id,name){ let st=stations.find(s=>s.id===id); if(st&&!st.isConnectionPoint) st.name=name.slice(0,20); }
        function recalcPassengers(){ if(gameMode==='free'){totalPassengers=0;return;} let sum=0; for(let st of stations){ if(st.isConnectionPoint)continue; let base=st.type==='popular'?150:(st.type==='center'?300:(st.type==='triple'?200:50)); sum+=base+Math.min(st.linesConnected.length,5)*30; } totalPassengers=sum; }
        function updateStatsUI(){ let badge=document.getElementById('gameStatusBadge'); let norm=stations.filter(s=>!s.isConnectionPoint).length; let points=stations.filter(s=>s.isConnectionPoint).length; let uniq=getUniqueLineColors(); if(gameMode==='free') badge.innerHTML=`🎮 Свободный | 🚉 ${norm} ст | ⚫ ${points} точек | 🎨 ${uniq} линий`; else badge.innerHTML=`📖 Сюжетный | 💰 ${Math.floor(money)}₽ | 👥 ${totalPassengers} пасс | 🚉 ${norm}`; }
        function updateUI(){ updateStatsUI(); }
        function applyEconomyTick(){ if(gameMode==='story'&&gameStarted){ money+=Math.floor(totalPassengers/20)+50; updateStatsUI(); } }
        function saveGame(slot){ if(!gameStarted)return; saves[slot]={stations,lines,nextStationId,nextLineId,gameMode,money,totalPassengers,camera:{x:camera.x,y:camera.y,zoom:camera.zoom},version:1}; localStorage.setItem("metro_saves",JSON.stringify(saves)); alert(`Сохранено как "${slot}"`); }
        function loadGame(name){ let data=saves[name]; if(!data)return false; stations=data.stations||[]; lines=data.lines||[]; nextStationId=data.nextStationId||1; nextLineId=data.nextLineId||1; gameMode=data.gameMode||"free"; money=data.money||8000; totalPassengers=data.totalPassengers||0; if(data.camera){camera.x=data.camera.x;camera.y=data.camera.y;camera.zoom=data.camera.zoom;} gameStarted=true; selectedStartPoint=null; updateStatsUI(); recalcPassengers(); return true; }
        function newGame(mode,tutorial){ stations=[]; lines=[]; nextStationId=1; nextLineId=1; gameMode=mode; money=mode==='story'?8000:10000; totalPassengers=0; camera={x:0,y:0,zoom:1}; gameStarted=true; selectedStartPoint=null; tutorialMode=tutorial; tutorialStep=0; if(tutorialMode) showTutorial(); recalcPassengers(); updateStatsUI(); }
        
        // Отрисовка
        function drawGrid(){ let g=50, sx=-camera.x, sy=-camera.y, ex=sx+width/camera.zoom, ey=sy+height/camera.zoom; ctx.beginPath(); for(let x=Math.floor(sx/g)*g;x<=ex;x+=g){ let xx=(x+camera.x)*camera.zoom; ctx.moveTo(xx,0);ctx.lineTo(xx,height);} for(let y=Math.floor(sy/g)*g;y<=ey;y+=g){ let yy=(y+camera.y)*camera.zoom; ctx.moveTo(0,yy);ctx.lineTo(width,yy);} ctx.strokeStyle="#2f3b5c";ctx.stroke(); }
        function drawLineSeg(p1,p2,col){ let a=worldToScreen(p1.x,p1.y),b=worldToScreen(p2.x,p2.y); ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=col;ctx.lineWidth=8;ctx.stroke();ctx.lineWidth=2.5;ctx.strokeStyle="#ffffffcc";ctx.stroke(); }
        function drawLines(){ let groups=new Map(); for(let l of lines)if(l.points.length>1){let k=`${Math.min(l.stationIds[0],l.stationIds[1])}_${Math.max(l.stationIds[0],l.stationIds[1])}`;if(!groups.has(k))groups.set(k,[]);groups.get(k).push(l);} for(let [k,gr] of groups){ let total=gr.length,sp=12,stOff=-((total-1)*sp)/2,convD=28; for(let i=0;i<gr.length;i++){ let l=gr[i],off=stOff+i*sp,p1=l.points[0],p2=l.points[1],st1=stations.find(s=>s.id===l.stationIds[0]),st2=stations.find(s=>s.id===l.stationIds[1]),c1=st1?st1.convergeToCenter:false,c2=st2?st2.convergeToCenter:false,dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.hypot(dx,dy); if(len===0)continue; let perpX=-dy/len,perpY=dx/len; if(total===1){drawLineSeg(p1,p2,l.color);continue;} if(c1&&c2){let t1=Math.min(1,convD/len),t2=Math.max(0,1-convD/len),j1={x:p1.x+(p2.x-p1.x)*t1,y:p1.y+(p2.y-p1.y)*t1},j2={x:p1.x+(p2.x-p1.x)*t2,y:p1.y+(p2.y-p1.y)*t2},so={x:p1.x+perpX*off,y:p1.y+perpY*off},eo={x:p2.x+perpX*off,y:p2.y+perpY*off}; drawLineSeg(p1,j1,l.color);drawLineSeg(j1,so,l.color);drawLineSeg(so,eo,l.color);drawLineSeg(eo,j2,l.color);drawLineSeg(j2,p2,l.color);} else if(c1&&!c2){let t1=Math.min(1,convD/len),j={x:p1.x+(p2.x-p1.x)*t1,y:p1.y+(p2.y-p1.y)*t1},eo={x:p2.x+perpX*off,y:p2.y+perpY*off};drawLineSeg(p1,j,l.color);drawLineSeg(j,eo,l.color);} else if(!c1&&c2){let t2=Math.max(0,1-convD/len),j={x:p1.x+(p2.x-p1.x)*t2,y:p1.y+(p2.y-p1.y)*t2},so={x:p1.x+perpX*off,y:p1.y+perpY*off};drawLineSeg(so,j,l.color);drawLineSeg(j,p2,l.color);} else{let so={x:p1.x+perpX*off,y:p1.y+perpY*off},eo={x:p2.x+perpX*off,y:p2.y+perpY*off};drawLineSeg(so,eo,l.color);} } } }
        function drawStations(){ for(let st of stations){ let pos=worldToScreen(st.x,st.y); if(st.isConnectionPoint){ if(activeTool==="line"&&!isDeleteLineMode){ ctx.beginPath();ctx.arc(pos.x,pos.y,8,0,Math.PI*2);ctx.fillStyle=st.convergeToCenter?"#ffaa66":"#88aaff";ctx.fill();ctx.strokeStyle="#fff";ctx.stroke();} continue; } let rad=st.type==='popular'?18:(st.type==='center'?22:(st.type==='triple'?20:13)); rad*=Math.min(1.2,camera.zoom); ctx.beginPath();ctx.arc(pos.x,pos.y,rad,0,Math.PI*2);ctx.fillStyle="#152238";ctx.fill();ctx.strokeStyle="#aaccff";ctx.stroke(); if(st.type==='popular'){ ctx.beginPath();ctx.arc(pos.x,pos.y,rad-4,0,Math.PI*2);ctx.fillStyle="#ffd966";ctx.fill(); } else if(st.type==='center'){ for(let i=0;i<4;i++){ let a=i*Math.PI*2/4,xo=Math.cos(a)*10,yo=Math.sin(a)*10; ctx.beginPath();ctx.arc(pos.x+xo,pos.y+yo,6,0,Math.PI*2);ctx.fillStyle="#5a7bc2";ctx.fill(); } } else if(st.type==='triple'){ for(let i=0;i<3;i++){ let a=i*Math.PI*2/3,xo=Math.cos(a)*10,yo=Math.sin(a)*10; ctx.beginPath();ctx.arc(pos.x+xo,pos.y+yo,6,0,Math.PI*2);ctx.fillStyle="#5a7bc2";ctx.fill(); } } else{ ctx.beginPath();ctx.arc(pos.x,pos.y,rad-3,0,Math.PI*2);ctx.fillStyle="#5a7bc2";ctx.fill(); } ctx.font=`bold ${Math.max(10,12*Math.min(1.2,camera.zoom))}px Inter`; ctx.fillStyle="#fff";ctx.fillText(st.name,pos.x-25,pos.y-rad-4); ctx.font="9px monospace";ctx.fillStyle="#ddddff";ctx.fillText(`🔗${st.linesConnected.length}`,pos.x+12,pos.y-6); } if(selectedStartPoint&&activeTool==="line"&&!isDeleteLineMode&&!isPointCreationMode){ let p=worldToScreen(selectedStartPoint.x,selectedStartPoint.y); ctx.beginPath();ctx.arc(p.x,p.y,22,0,Math.PI*2);ctx.strokeStyle="#ffaa44";ctx.lineWidth=3;ctx.setLineDash([6,8]);ctx.stroke();ctx.setLineDash([]); } if(activeTool==="line"&&!isDeleteLineMode&&!isPointCreationMode) for(let st of stations){ if(selectedStartPoint&&selectedStartPoint.id===st.id)continue; let p=worldToScreen(st.x,st.y); ctx.beginPath();ctx.arc(p.x,p.y,14,0,Math.PI*2);ctx.strokeStyle="#88ff88";ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]); } }
        function render(){ if(!ctx)return; ctx.clearRect(0,0,width,height); ctx.save(); drawGrid(); drawLines(); drawStations(); ctx.restore(); }
        
        // Модалки
        function showModal(title,def,cb){ let div=document.createElement('div');div.className='custom-modal';div.innerHTML=`<h3 style="color:#fff">${title}</h3><input id="modalInp" value="${def}" autofocus><div class="modal-buttons"><button class="modal-btn confirm">Подтвердить</button><button class="modal-btn cancel">Отмена</button></div>`; document.body.appendChild(div); let inp=div.querySelector('#modalInp'); inp.select(); div.querySelector('.confirm').onclick=()=>{let v=inp.value.trim();if(v)cb(v);div.remove();playSound('click');}; div.querySelector('.cancel').onclick=()=>{div.remove();playSound('click');}; }
        
        // Меню игры
        let menuPanel=null;
        function toggleGameMenu(){ if(menuPanel){menuPanel.remove();menuPanel=null;}else{ let p=document.createElement('div');p.className='game-menu-panel';p.innerHTML='<button id="menuContinue">▶ Продолжить</button><button id="menuSaveExit">💾 Сохранить и выйти</button><button id="menuExitDesktop">🚪 Выйти на рабочий стол</button>'; document.body.appendChild(p); let rect=document.getElementById('menuButton').getBoundingClientRect(); p.style.left=rect.left+'px'; p.style.top=(rect.bottom+5)+'px'; p.querySelector('#menuContinue').onclick=()=>{p.remove();menuPanel=null;playSound('click');}; p.querySelector('#menuSaveExit').onclick=()=>{let name=prompt("Название сохранения","metro_autosave");if(name)saveGame(name);p.remove();menuPanel=null;location.reload();}; p.querySelector('#menuExitDesktop').onclick=()=>{window.close();}; menuPanel=p; } }
        
        // Обработка мыши
        function onMouseDown(e){ if(!gameStarted)return; let w=screenToWorld(e.clientX,e.clientY); if(e.button===1||(e.button===0&&e.ctrlKey)){ isPanning=true; panStart={x:e.clientX-camera.x*camera.zoom,y:e.clientY-camera.y*camera.zoom}; e.preventDefault(); return; } if(e.button===2){ let lr=getLineAtWorld(w.x,w.y,6); if(lr){ closeContextMenu(); let m=document.createElement('div');m.className='custom-context-menu';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.innerHTML=`<button id="lineUp">⬆️ Поднять</button><button id="lineDown">⬇️ Опустить</button><hr><button id="lineDel">🗑️ Удалить</button><button id="lineCancel">Отмена</button>`; m.querySelector('#lineUp').onclick=()=>{reorderLine(lr.line,-1);m.remove();}; m.querySelector('#lineDown').onclick=()=>{reorderLine(lr.line,1);m.remove();}; m.querySelector('#lineDel').onclick=()=>{if(confirm("Удалить?"))removeLine(lr.line.id);m.remove();}; m.querySelector('#lineCancel').onclick=()=>m.remove(); document.body.appendChild(m); currentContextMenu=m; e.preventDefault(); return; } let st=getStationAtWorld(w.x,w.y,30); if(st){ closeContextMenu(); let m=document.createElement('div');m.className='custom-context-menu';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.innerHTML=`<button id="renameSt">✏️ Переименовать</button><button id="convergeSt">${st.convergeToCenter?'🔘 Отключить схождение':'🔘 Включить схождение'}</button><hr><button id="delSt">🗑️ Снести</button><button id="cancelSt">Отмена</button>`; m.querySelector('#renameSt').onclick=()=>{showModal("Название станции",st.name,n=>{renameStation(st.id,n);m.remove();});}; m.querySelector('#convergeSt').onclick=()=>{toggleConvergeToCenter(st);m.remove();}; m.querySelector('#delSt').onclick=()=>{if(confirm("Удалить?"))removeStation(st.id);m.remove();}; m.querySelector('#cancelSt').onclick=()=>m.remove(); document.body.appendChild(m); currentContextMenu=m; e.preventDefault(); } return; } if(e.button===0){ if(isDeleteLineMode&&activeTool==="line"){ let lr=getLineAtWorld(w.x,w.y,6); if(lr&&confirm("Удалить линию?"))removeLine(lr.line.id); return; } if(isPointCreationMode){ addConnectionPoint(w.x,w.y); return; } if(activeTool==="station"){ showModal("Название станции",`Станция ${nextStationId}`,name=>{ let ns=addStation(w.x,w.y,selectedStationType,name); if(ns&&gameMode==='story'){ let cost=selectedStationType==='center'?1200:(selectedStationType==='triple'?800:(selectedStationType==='popular'?600:400)); if(money>=cost)money-=cost; else{removeStation(ns.id);alert("Недостаточно средств!");} } recalcPassengers(); updateStatsUI(); }); } else if(activeTool==="line"&&!isDeleteLineMode){ let cp=getStationAtWorld(w.x,w.y,28); if(!cp){selectedStartPoint=null;return;} if(selectedStartPoint===null)selectedStartPoint=cp; else{if(selectedStartPoint.id!==cp.id)createLine(selectedStartPoint,cp,currentLineColor); selectedStartPoint=null;} } } }
        function onMouseMove(e){ if(!gameStarted)return; if(isPanning){ camera.x=(e.clientX-panStart.x)/camera.zoom; camera.y=(e.clientY-panStart.y)/camera.zoom; panStart={x:e.clientX-camera.x*camera.zoom,y:e.clientY-camera.y*camera.zoom}; } }
        function onMouseUp(e){ if(isPanning)isPanning=false; }
        function onWheel(e){ e.preventDefault(); let delta=e.deltaY>0?0.9:1.1, oz=camera.zoom, nz=Math.min(2.5,Math.max(0.5,oz*delta)); let rect=canvas.getBoundingClientRect(), mx=(e.clientX-rect.left)*(canvas.width/rect.width), my=(e.clientY-rect.top)*(canvas.height/rect.height); let wb={x:(mx/oz)-camera.x,y:(my/oz)-camera.y}; camera.zoom=nz; let wa={x:(mx/nz)-camera.x,y:(my/nz)-camera.y}; camera.x+=wa.x-wb.x; camera.y+=wa.y-wb.y; }
        function resize(){ width=window.innerWidth; height=window.innerHeight; canvas.width=width; canvas.height=height; }
        
        let econInterval;
        function startLoop(){ function anim(){ render(); requestAnimationFrame(anim); } anim(); econInterval=setInterval(()=>{ if(gameStarted&&gameMode==='story'){ applyEconomyTick(); recalcPassengers(); updateStatsUI(); } },2000); }
        
        // Меню
        function buildMainMenu(){ let div=document.createElement('div');div.className='main-menu';div.innerHTML=`<div class="menu-card"><h1>SUBWAY BUILDER</h1><div class="subtitle">Построй свою подземную сеть</div><button id="newGameBtn" class="menu-btn">✨ Новая игра</button><button id="loadGameBtn" class="menu-btn">💾 Загрузить</button><div id="modeSelection" style="display:none;"><div class="mode-selector"><div class="mode-option" data-mode="free">🎨 Свободный</div><div class="mode-option" data-mode="story">📖 Сюжетный</div><div class="mode-option" data-mode="tutorial">📚 Обучение</div></div><button id="confirmModeBtn" class="menu-btn">Создать</button><button id="cancelModeBtn" class="menu-btn" style="background:#3a2a2a;">Отмена</button></div><div id="saveListPanel" style="display:none;" class="save-load-panel"></div></div>`; document.body.appendChild(div); let newBtn=div.querySelector('#newGameBtn'),loadBtn=div.querySelector('#loadGameBtn'),modeDiv=div.querySelector('#modeSelection'),savePanel=div.querySelector('#saveListPanel'),selectedMode="free"; newBtn.onclick=()=>{modeDiv.style.display='block';savePanel.style.display='none';let opts=document.querySelectorAll('.mode-option');opts.forEach(o=>{o.onclick=()=>{opts.forEach(x=>x.classList.remove('selected'));o.classList.add('selected');selectedMode=o.dataset.mode;};});if(opts.length)opts[0].classList.add('selected');div.querySelector('#confirmModeBtn').onclick=()=>{newGame(selectedMode,selectedMode==='tutorial');div.remove();document.getElementById('mainToolbar').style.display='flex';if(selectedMode!=='tutorial')document.querySelector('.tutorial-overlay')?.remove();playSound('click');initAudio();if(audioCtx)audioCtx.resume();};div.querySelector('#cancelModeBtn').onclick=()=>{modeDiv.style.display='none';};}; loadBtn.onclick=()=>{savePanel.style.display='block';modeDiv.style.display='none';savePanel.innerHTML='<h3 style="margin-bottom:12px;color:#fff;">💾 Сохранения</h3>';let keys=Object.keys(saves);if(!keys.length)savePanel.innerHTML+='<p style="color:#ccc;">Нет сохранений</p>';for(let k of keys){let item=document.createElement('div');item.className='save-item';item.innerHTML=`<span>📁 ${k}</span><button class="delete-save">🗑️</button>`;item.querySelector('span').onclick=()=>{if(loadGame(k)){div.remove();document.getElementById('mainToolbar').style.display='flex';playSound('click');initAudio();if(audioCtx)audioCtx.resume();}};item.querySelector('.delete-save').onclick=(e)=>{e.stopPropagation();delete saves[k];localStorage.setItem("metro_saves",JSON.stringify(saves));buildMainMenu();div.remove();};savePanel.appendChild(item);}let back=document.createElement('button');back.textContent='← Назад';back.className='menu-btn';back.onclick=()=>{buildMainMenu();div.remove();};savePanel.appendChild(back);}; }
        
        function setupUI(){ 
            document.getElementById('toolStation').onclick=()=>{activeTool="station";isPointCreationMode=false;isDeleteLineMode=false;selectedStartPoint=null;document.getElementById('toolStation').classList.add('active');document.getElementById('toolLine').classList.remove('active');document.getElementById('stationToolsPanel').style.display='flex';document.getElementById('lineToolsPanel').style.display='none';closeContextMenu();document.getElementById('infoHint').innerHTML='🏛️ Режим: СТАНЦИИ | Выберите тип';}; 
            document.getElementById('toolLine').onclick=()=>{activeTool="line";isPointCreationMode=false;isDeleteLineMode=false;selectedStartPoint=null;document.getElementById('toolLine').classList.add('active');document.getElementById('toolStation').classList.remove('active');document.getElementById('stationToolsPanel').style.display='none';document.getElementById('lineToolsPanel').style.display='flex';closeContextMenu();document.getElementById('infoHint').innerHTML='📈 Режим: ЛИНИИ | Клик на станцию → затем на другую';}; 
            document.getElementById('normalStationBtn').onclick=()=>{selectedStationType="normal";playSound('click');}; 
            document.getElementById('popularStationBtn').onclick=()=>{selectedStationType="popular";playSound('click');}; 
            document.getElementById('centerStationBtn').onclick=()=>{selectedStationType="center";playSound('click');}; 
            document.getElementById('tripleStationBtn').onclick=()=>{selectedStationType="triple";playSound('click');}; 
            document.getElementById('lineColorPicker').onchange=e=>currentLineColor=e.target.value; 
            document.getElementById('addPointModeBtn').onclick=()=>{if(activeTool!=="line"){alert("Выберите 'Линия'");return;}isPointCreationMode=true;isDeleteLineMode=false;selectedStartPoint=null;document.getElementById('addPointModeBtn').classList.add('active-mode');document.getElementById('deleteLineModeBtn').classList.remove('active-mode');document.getElementById('addPointModeBtn').style.display='none';document.getElementById('deleteLineModeBtn').style.display='none';document.getElementById('exitPointModeBtn').style.display='inline-block';document.getElementById('infoHint').innerHTML='⚫ РЕЖИМ ТОЧЕК | Кликайте на карту';playSound('click');}; 
            document.getElementById('deleteLineModeBtn').onclick=()=>{if(activeTool!=="line"){alert("Выберите 'Линия'");return;}isDeleteLineMode=true;isPointCreationMode=false;selectedStartPoint=null;document.getElementById('deleteLineModeBtn').classList.add('active-mode');document.getElementById('addPointModeBtn').classList.remove('active-mode');document.getElementById('addPointModeBtn').style.display='none';document.getElementById('deleteLineModeBtn').style.display='none';document.getElementById('exitPointModeBtn').style.display='inline-block';document.getElementById('infoHint').innerHTML='🗑️ РЕЖИМ УДАЛЕНИЯ | Клик на линию';playSound('click');}; 
            document.getElementById('exitPointModeBtn').onclick=()=>{isPointCreationMode=false;isDeleteLineMode=false;selectedStartPoint=null;document.getElementById('addPointModeBtn').classList.remove('active-mode');document.getElementById('deleteLineModeBtn').classList.remove('active-mode');document.getElementById('addPointModeBtn').style.display='inline-block';document.getElementById('deleteLineModeBtn').style.display='inline-block';document.getElementById('exitPointModeBtn').style.display='none';document.getElementById('infoHint').innerHTML='📈 Режим: ЛИНИИ | Клик на станцию → затем на другую';playSound('click');}; 
            document.getElementById('saveTopBtn').onclick=()=>{if(!gameStarted)alert("Начните игру!");else showModal("Название сохранения",`metro_${new Date().toLocaleTimeString()}`,n=>saveGame(n));}; 
            document.getElementById('menuButton').onclick=()=>toggleGameMenu(); 
        }
        
        function init(){ resize(); window.addEventListener('resize',resize); canvas.addEventListener('mousedown',onMouseDown); canvas.addEventListener('mousemove',onMouseMove); canvas.addEventListener('mouseup',onMouseUp); canvas.addEventListener('wheel',onWheel); canvas.addEventListener('contextmenu',e=>e.preventDefault()); buildMainMenu(); startLoop(); setupUI(); document.getElementById('mainToolbar').style.display='none'; document.getElementById('stationToolsPanel').style.display='none'; document.getElementById('lineToolsPanel').style.display='none'; initAudio(); }
        init();
    })();
</script>
</body>
